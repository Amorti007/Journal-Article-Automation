<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | MagReview</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-section {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--accent-soft) 100%);
        }

        .auth-card {
            background-color: var(--bg-card);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="MagReview Logo" class="logo-img">
            </a>
            <nav class="nav-links">
                <a href="dergiler.html" class="nav-link">Dergiler</a>
                <a href="makaleler.html" class="nav-link">Makaleler</a>
                <a href="hakkimizda.html" class="nav-link">Hakkımızda</a>
            </nav>
            <div class="nav-actions">
                <button id="themeToggle" class="theme-btn" title="Temayı Değiştir">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M22 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
                    <svg class="moon-icon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card animate-fade-in">
                <h1>Kayıt Ol</h1>
                <p>MagReview topluluğuna katılın.</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="fullname">Ad Soyad</label>
                        <input type="text" id="fullname" class="form-control" placeholder="Adınız Soyadınız" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">E-posta Adresi</label>
                        <input type="email" id="email" class="form-control" placeholder="ornek@mail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Şifre</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group" style="display: flex; gap: 0.5rem; align-items: flex-start;">
                        <input type="checkbox" id="terms" required style="margin-top: 0.25rem;">
                        <label for="terms" style="font-size: 0.875rem; color: var(--text-secondary);">Kullanım Şartları ve Gizlilik Politikası'nı okudum ve kabul ediyorum.</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1.125rem;">Hesap Oluştur</button>
                </form>
                
                <div class="auth-links">
                    Zaten hesabınız var mı? <a href="giris.html">Giriş Yap</a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate successful registration and login
            localStorage.setItem('isLoggedIn', 'true');
            // Redirect to homepage
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
